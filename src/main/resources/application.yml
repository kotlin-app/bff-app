server:
  port: 8080

spring:
  application:
    name: bff
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

# 各マイクロサービスのURL（Docker環境では環境変数で上書きする）
services:
  product-url: http://localhost:8081
  review-url: http://localhost:8082
  order-url: http://localhost:8083

cache:
  reviews:
    expire-minutes: 5

jwt:
  secret: "bff-secret-key-must-be-at-least-256-bits-long-for-hs256"
  expiration-ms: 3600000  # 1時間

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411}/api/v2/spans

resilience4j:
  circuitbreaker:
    instances:
      product-service:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
      review-service:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
      order-service:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
  timelimiter:
    instances:
      product-service:
        timeout-duration: 3s
      review-service:
        timeout-duration: 3s
      order-service:
        timeout-duration: 3s

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
